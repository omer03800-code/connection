        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width = window.innerWidth;
        const height = canvas.height = window.innerHeight;

        // D3 Force Simulation
        const simulation = d3.forceSimulation(networkData.nodes)
            .force('link', d3.forceLink(networkData.edges)
                .id(d => d.id)
                .distance(d => {
                    const typeDistance = { family: 40, friend: 60, acquaintance: 80 };
                    return typeDistance[d.type] || 60;
                })
            )
            .force('charge', d3.forceManyBody().strength(-100))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(12));

        // Rendering
        let selectedNode = null;
        let highlightedNodes = new Set();

        function updateCanvas() {
            ctx.clearRect(0, 0, width, height);

            // Draw edges
            networkData.edges.forEach(edge => {
                const source = networkData.nodes.find(n => n.id === edge.source);
                const target = networkData.nodes.find(n => n.id === edge.target);

                if (!source || !target) return;

                ctx.strokeStyle = getEdgeColor(edge.type);
                ctx.lineWidth = edge.strength * 0.6;
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.moveTo(source.x, source.y);
                ctx.lineTo(target.x, target.y);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // Draw nodes
            networkData.nodes.forEach(node => {
                const radius = 8;
                const isSelected = node === selectedNode;
                const isHighlighted = highlightedNodes.has(node.id);

                ctx.fillStyle = getNodeColor(node.type, isSelected, isHighlighted);
                ctx.strokeStyle = isSelected ? '#ffffff' : 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = isSelected ? 2.5 : 1;
                ctx.beginPath();
                ctx.arc(node.x, node.y, radius + (isSelected ? 2 : 0), 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        function getNodeColor(type, isSelected, isHighlighted) {
            if (isSelected) return '#ffffff';
            if (isHighlighted) return 'rgba(200, 200, 200, 0.8)';
            const colors = { family: '#e0e0e0', friend: '#b0b0b0', acquaintance: '#707070' };
            return colors[type] || '#808080';
        }

        function getEdgeColor(type) {
            const colors = { family: '#a0a0a0', friend: '#808080', acquaintance: '#505050' };
            return colors[type] || '#606060';
        }

        function buildPathToNode(node) {
            const visited = new Set();
            const queue = [[node, [node.id]]];
            visited.add(node.id);

            while (queue.length > 0) {
                const [current, path] = queue.shift();

                networkData.edges.forEach(edge => {
                    const next = edge.source === current.id 
                        ? networkData.nodes.find(n => n.id === edge.target)
                        : edge.target === current.id 
                        ? networkData.nodes.find(n => n.id === edge.source)
                        : null;

                    if (next && !visited.has(next.id)) {
                        visited.add(next.id);
                        highlightedNodes.add(next.id);
                        queue.push([next, [...path, next.id]]);
                    }
                });
            }
        }

        // Mouse interaction
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            selectedNode = null;
            highlightedNodes.clear();

            networkData.nodes.forEach(node => {
                const dist = Math.sqrt((node.x - x) ** 2 + (node.y - y) ** 2);
                if (dist < 12) {
                    selectedNode = node;
                    highlightedNodes.add(node.id);
                    buildPathToNode(node);
                    showNodeInfo(node);
                }
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const node = networkData.nodes.find(n => n.name.toLowerCase().includes(query));
            if (node) {
                selectedNode = node;
                highlightedNodes.clear();
                highlightedNodes.add(node.id);
                buildPathToNode(node);
                showNodeInfo(node);
                simulation.alpha(0.3).restart();
            }
        });

        // Info panel
        function showNodeInfo(node) {
            const html = `
                <h2>${node.name}</h2>
                ${node.age ? `<div class="info-item"><label>Age</label><value>${node.age}</value></div>` : ''}
                ${node.role ? `<div class="info-item"><label>Role</label><value>${node.role}</value></div>` : ''}
                ${node.city ? `<div class="info-item"><label>City</label><value>${node.city}</value></div>` : ''}
                ${node.country ? `<div class="info-item"><label>Country</label><value>${node.country}</value></div>` : ''}
                ${node.description ? `<div class="info-item"><label>About</label><value>${node.description}</value></div>` : ''}
                ${node.tags ? `<div class="info-item"><label>Tags</label><value>${node.tags}</value></div>` : ''}
            `;
            document.getElementById('infoContent').innerHTML = html;
            document.getElementById('infoPanel').classList.add('active');
        }

        document.getElementById('closeInfoBtn').addEventListener('click', () => {
            document.getElementById('infoPanel').classList.remove('active');
            selectedNode = null;
            highlightedNodes.clear();
        });

        // Add connection modal
        document.getElementById('addBtn').addEventListener('click', () => {
            document.getElementById('addModal').classList.add('active');
        });

        document.getElementById('cancelAddBtn').addEventListener('click', () => {
            document.getElementById('addModal').classList.remove('active');
        });

        document.getElementById('confirmAddBtn').addEventListener('click', () => {
            const name = document.getElementById('newName').value;
            const connectedTo = document.getElementById('newConnectedTo').value;
            const type = document.getElementById('newType').value;

            if (name && connectedTo) {
                alert('Connection added: ' + name + ' → ' + connectedTo);
                document.getElementById('addModal').classList.remove('active');
                document.getElementById('newName').value = '';
                document.getElementById('newConnectedTo').value = '';
            }
        });

        // Export button
        document.getElementById('exportBtn').addEventListener('click', () => {
            const dataStr = JSON.stringify(networkData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'network_data_' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Animation loop
        simulation.on('tick', updateCanvas);

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        updateCanvas();
    </script>
