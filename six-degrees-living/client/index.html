<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Six Degrees of Separation - Living Organism</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #visualization {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 12px;
      opacity: 0.7;
      pointer-events: auto;
    }

    .info h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .stats {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      opacity: 0.7;
    }

    .search-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 15px;
      border-radius: 8px;
      pointer-events: auto;
    }

    .search-panel input {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      width: 250px;
      outline: none;
    }

    .search-panel input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .card-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100%;
      background: rgba(20, 20, 30, 0.95);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 20px;
      color: #fff;
      pointer-events: auto;
    }

    .card-panel.open {
      right: 0;
    }

    .card-panel h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card-panel .meta {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .card-panel .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    .card-panel .tag {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="visualization"></div>

  <div class="hud">
    <div class="info">
      <h1>Six Degrees</h1>
      <p>Interactive network visualization</p>
    </div>

    <div class="stats" id="stats">
      FPS: -- | People: -- | Connections: --
    </div>

    <div class="search-panel">
      <input type="text" id="search" placeholder="Search by name, city, role...">
    </div>

    <div class="card-panel" id="card-panel">
      <h2 id="card-name">Person Name</h2>
      <div class="meta" id="card-meta"></div>
      <p id="card-description"></p>
      <div class="tags" id="card-tags"></div>
    </div>
  </div>

  <!-- Load Three.js and D3 -->
  <script src="vendor/three.min.js"></script>
  <script src="vendor/d3.min.js"></script>

  <!-- Load main application with modules -->
  <script type="module" src="src/main.js"></script>

  <script>
    // Simple FPS counter
    let frameCount = 0;
    let lastTime = Date.now();

    function updateStats() {
      const now = Date.now();
      if (now >= lastTime + 1000) {
        const fps = Math.round(frameCount * 1000 / (now - lastTime));
        document.getElementById('stats').textContent = `FPS: ${fps} | People: -- | Connections: --`;
        frameCount = 0;
        lastTime = now;
      }
      frameCount++;
    }

    // Hook into animation loop
    const originalRender = THREE.WebGLRenderer.prototype.render;
    THREE.WebGLRenderer.prototype.render = function(...args) {
      updateStats();
      return originalRender.apply(this, args);
    };
  </script>
</body>
</html>
